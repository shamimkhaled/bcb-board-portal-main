<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#006A4E" />
    <title>Offline · BCB Portal</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        background: linear-gradient(160deg, #006a4e 0%, #0a3d32 55%, #071b17 100%);
        color: #f7faf8;
      }
      main {
        width: min(420px, 100%);
        border-radius: 20px;
        padding: 28px 24px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(12px);
        text-align: center;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.35rem;
      }
      p {
        margin: 0;
        line-height: 1.55;
        color: rgba(247, 250, 248, 0.82);
        font-size: 0.95rem;
      }
      button {
        margin-top: 20px;
        min-height: 44px;
        padding: 0 18px;
        border: 0;
        border-radius: 12px;
        background: #c8a85a;
        color: #071b17;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>
        Cached portal pages may still open. Sign-in, approvals, uploads, and live notifications need a
        connection.
      </p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
