<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#006A4E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>BCB Portal</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #006a4e;
        color: #fff;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      }
      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        text-align: center;
      }
      p {
        max-width: 28rem;
        line-height: 1.5;
        opacity: 0.9;
      }
      code {
        font-size: 0.85em;
      }
    </style>
  </head>
  <body>
    <main>
      <div>
        <h1>BCB Portal</h1>
        <p>
          Native shell placeholder. Capacitor loads the production HTTPS portal via
          <code>server.url</code> in <code>capacitor.config.ts</code>.
        </p>
        <p>If you see this screen, set <code>CAPACITOR_SERVER_URL</code> and run <code>npx cap sync</code>.</p>
      </div>
    </main>
  </body>
</html>
